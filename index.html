<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wedeinvite</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { height: 300vh; }
      .sticky-container {
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      canvas {
        height: 100vh;
        width: auto;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: sans-serif;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading...</div>
    <div class="sticky-container">
      <canvas id="scroll-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
